kind = "web"
previewPath = "/"
title = "Smart Traffic Management"
version = "1.0.0"
id = "artifacts/traffic-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23600

[services.development]
run = "pnpm --filter @workspace/traffic-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/traffic-mgmt", "run", "build" ]
publicDir = "artifacts/traffic-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23600"
BASE_PATH = "/"
